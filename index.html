<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل حساب جديد</title>
<style>
body { font-family: Arial; display:flex; justify-content:center; align-items:center; min-height:100vh; background:#f0f2f5; }
.container { background:white; padding:30px; border-radius:10px; width: 350px; }
h1 { text-align:center; margin-bottom:20px; }
input { width:100%; padding:10px; margin:10px 0; border-radius:5px; border:1px solid #ccc; font-size:16px; }
button { width:100%; padding:10px; background:#667eea; color:white; border:none; border-radius:5px; font-size:16px; cursor:pointer; }
button:disabled { background:#aaa; cursor:not-allowed; }
.message { margin:10px 0; text-align:center; font-size:14px; display:none; }
.message.success { color:green; display:block; }
.message.error { color:red; display:block; }
.code-inputs { display:flex; justify-content:space-between; margin:15px 0; }
.code-inputs input { width:40px; height:40px; text-align:center; font-size:18px; }
</style>
</head>
<body>
<div class="container">
  <div id="email-section">
    <h1>تسجيل حساب جديد</h1>
    <input type="email" id="email" placeholder="أدخل بريدك الإلكتروني">
    <button id="sendBtn">إرسال رمز التحقق</button>
    <div id="emailMsg" class="message"></div>
  </div>

  <div id="verify-section" style="display:none;">
    <h1>تحقق من بريدك</h1>
    <div class="code-inputs">
      <input type="text" maxlength="1"><input type="text" maxlength="1">
      <input type="text" maxlength="1"><input type="text" maxlength="1">
      <input type="text" maxlength="1"><input type="text" maxlength="1">
    </div>
    <button id="verifyBtn">تحقق من الرمز</button>
    <div id="verifyMsg" class="message"></div>
  </div>
</div>

<script>
const sendBtn = document.getElementById('sendBtn');
const verifyBtn = document.getElementById('verifyBtn');
const emailInput = document.getElementById('email');
const emailMsg = document.getElementById('emailMsg');
const verifyMsg = document.getElementById('verifyMsg');
const emailSection = document.getElementById('email-section');
const verifySection = document.getElementById('verify-section');

sendBtn.onclick = async () => {
  const email = emailInput.value;
  if(!email) return;
  sendBtn.disabled = true;
  emailMsg.style.display='none';

  try {
    const res = await fetch('/api/send-code', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email}) });
    const data = await res.json();
    if(data.success){
      emailSection.style.display='none';
      verifySection.style.display='block';
    } else {
      emailMsg.className='message error';
      emailMsg.textContent = data.message;
      emailMsg.style.display='block';
    }
  } catch(err){
    emailMsg.className='message error';
    emailMsg.textContent='حدث خطأ';
    emailMsg.style.display='block';
  }
  sendBtn.disabled = false;
};

verifyBtn.onclick = async () => {
  const inputs = document.querySelectorAll('.code-inputs input');
  const code = Array.from(inputs).map(i=>i.value).join('');
  const email = emailInput.value;
  if(code.length!==6) return;

  verifyBtn.disabled = true;
  verifyMsg.style.display='none';

  try {
    const res = await fetch('/api/verify-code', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email, code}) });
    const data = await res.json();
    if(data.success){
      verifyMsg.className='message success';
      verifyMsg.textContent = data.message;
    } else {
      verifyMsg.className='message error';
      verifyMsg.textContent = data.message;
    }
  } catch(err){
    verifyMsg.className='message error';
    verifyMsg.textContent = 'حدث خطأ';
  }
  verifyBtn.disabled = false;
};
</script>
</body>
</html>

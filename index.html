<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل حساب جديد</title>
<style>
body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f0;margin:0;padding:20px}
.container{background:#fff;padding:40px;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.2);width:100%;max-width:400px}
h1{text-align:center;margin-bottom:20px;color:#333}
input,button{width:100%;padding:12px;margin-bottom:15px;border-radius:5px;border:1px solid #ccc;font-size:14px}
button{background:#667eea;color:#fff;border:none;cursor:pointer;font-weight:bold}
.message{display:none;text-align:center;padding:10px;margin-bottom:10px;border-radius:5px;font-size:14px}
.message.success{background:#d4edda;color:#155724;display:block}
.message.error{background:#f8d7da;color:#721c24;display:block}
.verification-section{display:none}
.verification-section.active{display:block}
.code-input-group{display:flex;gap:5px;justify-content:center}
.code-input-group input{text-align:center;font-size:24px;width:50px;height:50px}
</style>
</head>
<body>
<div class="container">
<div id="emailSection">
<h1>تسجيل حساب جديد</h1>
<input type="email" id="email" placeholder="أدخل بريدك الإلكتروني" required>
<button id="sendCodeBtn">إرسال رمز التحقق</button>
<div id="emailMessage" class="message"></div>
</div>

<div id="verificationSection" class="verification-section">
<h1>تحقق من حسابك</h1>
<div class="code-input-group">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
<input type="text" class="code-input" maxlength="1" inputmode="numeric">
</div>
<button id="verifyBtn">تحقق من الرمز</button>
<div id="verificationMessage" class="message"></div>
</div>
</div>

<script>
const emailSection=document.getElementById('emailSection');
const verificationSection=document.getElementById('verificationSection');
const emailMessage=document.getElementById('emailMessage');
const verificationMessage=document.getElementById('verificationMessage');

document.getElementById('sendCodeBtn').addEventListener('click',async()=>{
const email=document.getElementById('email').value;
if(!email){emailMessage.textContent='الرجاء إدخال البريد';emailMessage.className='message error';return;}
try{
const res=await fetch('/api/send-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
const data=await res.json();
if(data.success){emailMessage.textContent=data.message;emailMessage.className='message success';
emailSection.style.display='none';verificationSection.classList.add('active');} 
else{emailMessage.textContent=data.message;emailMessage.className='message error';}}catch(e){emailMessage.textContent='خطأ في الاتصال';emailMessage.className='message error';}});

document.getElementById('verifyBtn').addEventListener('click',async()=>{
const codeInputs=document.querySelectorAll('.code-input');
let code='';codeInputs.forEach(input=>{code+=input.value});
const email=document.getElementById('email').value;
try{
const res=await fetch('/api/verify-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,code})});
const data=await res.json();
if(data.success){verificationMessage.textContent=data.message;verificationMessage.className='message success';} 
else{verificationMessage.textContent=data.message;verificationMessage.className='message error';}}catch(e){verificationMessage.textContent='خطأ في الاتصال';verificationMessage.className='message error';}});
</script>
</body>
</html>

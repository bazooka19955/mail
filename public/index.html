<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل حساب</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .container{background:white;padding:40px;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);max-width:400px;width:100%}
        h1{text-align:center;color:#333;margin-bottom:30px;font-size:24px}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:8px;color:#555;font-weight:500}
        input{width:100%;padding:15px;border:2px solid #e1e5e9;border-radius:12px;font-size:16px;transition:all .3s}
        input:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
        .code-inputs{display:flex;gap:10px}
        .code-inputs input{width:50px;text-align:center;font-size:24px;font-weight:bold;letter-spacing:2px}
        button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .3s}
        button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(102,126,234,.3)}
        button:disabled{opacity:.6;cursor:not-allowed}
        .message{padding:12px;border-radius:8px;margin:15px 0;text-align:center;font-weight:500}
        .success{background:#d4edda;color:#155724}
        .error{background:#f8d7da;color:#721c24}
        .resend{text-align:center;margin-top:15px;color:#667eea;cursor:pointer;font-size:14px}
        .resend:hover{text-decoration:underline}
    </style>
</head>
<body>
    <div class="container">
        <h1>تسجيل حساب جديد</h1>
        <div id="step1">
            <div class="form-group">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" placeholder="your@email.com">
            </div>
            <button onclick="requestCode()">إرسال كود التحقق</button>
        </div>
        <div id="step2" style="display:none">
            <div class="message success" id="successMsg"></div>
            <label>كود التحقق (6 أرقام)</label>
            <div class="code-inputs">
                <input type="text" maxlength="1" pattern="[0-9]">
                <input type="text" maxlength="1" pattern="[0-9]">
                <input type="text" maxlength="1" pattern="[0-9]">
                <input type="text" maxlength="1" pattern="[0-9]">
                <input type="text" maxlength="1" pattern="[0-9]">
                <input type="text" maxlength="1" pattern="[0-9]">
            </div>
            <button onclick="verifyCode()">التحقق</button>
            <div class="resend" onclick="requestCode()">كود جديد</div>
        </div>
        <div id="message"></div>
    </div>
    <script>
        let currentEmail='';
        const codeInputs=document.querySelectorAll('.code-inputs input');
        codeInputs.forEach((input,idx)=>{input.oninput=e=>{if(e.target.value.length===1&&idx<5)codeInputs[idx+1].focus()};input.onkeydown=e=>{if(e.key==='Backspace'&&!e.target.value&&idx>0)codeInputs[idx-1].focus()}});

        async function requestCode(){
            const email=document.getElementById('email').value;
            if(!email) return showMsg('أدخل بريدك','error');
            const btn=event.target;btn.disabled=true;btn.textContent='جاري الإرسال...';
            try{
                const res=await fetch('/api/request-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email})});
                const data=await res.json();
                if(res.ok){
                    currentEmail=email;document.getElementById('step1').style.display='none';document.getElementById('step2').style.display='block';document.getElementById('successMsg').textContent=data.message;codeInputs[0].focus()
                }else showMsg(data.error||'خطأ','error')
            }catch{showMsg('خطأ اتصال','error')}
            finally{btn.disabled=false;btn.textContent='إرسال كود التحقق'}
        }

        async function verifyCode(){
            const code=Array.from(codeInputs).map(i=>i.value).join('');
            if(code.length!==6) return showMsg('أدخل 6 أرقام','error');
            const btn=event.target;btn.disabled=true;btn.textContent='جاري التحقق...';
            try{
                const res=await fetch('/api/verify-code',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:currentEmail,code})});
                const data=await res.json();
                if(res.ok){
                    showMsg('✅ تم التحقق بنجاح!','success');
                    setTimeout(()=>location.reload(),2000)
                }else{
                    showMsg(data.error,'error');codeInputs.forEach(i=>i.value='');codeInputs[0].focus()
                }
            }catch{showMsg('خطأ اتصال','error')}
            finally{btn.disabled=false;btn.textContent='التحقق'}
        }

        function showMsg(text,type){
            const msg=document.getElementById('message');
            msg.innerHTML=`<div class="message ${type}">${text}</div>`;
            setTimeout(()=>msg.innerHTML='',5000)
        }
    </script>
</body>
</html>
